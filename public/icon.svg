    <path d="M 42 50 L 20 10 Q 50 0 80 10 L 58 50 Z" fill="#FF5722" />
    <path d="M 42 50 L 20 90 Q 50 100 80 90 L 58 50 Z" fill="#FF5722" />
    
    <!-- Cuerpo Blanco Central -->
